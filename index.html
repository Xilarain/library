<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Document</title>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <h1>Xilarain's Dark Library</h1>
        </div>
        <div class="content-container">
            <div class="btn-container">
            <button class="blue-btn" command="show-modal" commandfor="my-dialog">ADD BOOK</button>
            <dialog id="my-dialog">
                <div class="form-container">
                    <form action="#" id="form">
                        <div class="form-layout">
                            <div class="close-container"><button class="close" id="close">x</button></div>
                            <div class="input-label">
                                <label for="title">Title:</label>
                                <input type="text" id="title" name="title" required>
                            </div>
                            <div class="input-label">
                                <label for="author">Author:</label>
                                <input type="text" id="author" name="author" required>
                            </div>
                            <div class="input-label">
                                <label for="pages">Pages:</label>
                                <input type="number" id="pages" name="pages" required>
                            </div>
                            <div class="input-label">
                                <label for="read">Read:</label>
                                <input type="text" id="read" name="read" required>
                            </div>
                            <div class="form-submit"><button type="submit" id="book-submit">Add Book</button></div>
                        </div>
                    </form>
                </div>
            </dialog>
            </div>
            <div class="card-grid" id="card-grid">
                
                </div>
            </div>
        </div>
    </div>
</body>
</html>
